<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MayWiFin 🎵</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons (Material Symbols Rounded) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

    <!-- Dynamic Album Blur Backdrop -->
    <div id="app-backdrop" class="app-backdrop"></div>
    <div id="backdrop-overlay" class="backdrop-overlay"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>MayWiFin</h2>
        </div>
        <ul class="nav-links">
            <li><a href="#/" class="nav-btn active" data-route="/"><span class="material-symbols-rounded">home</span> Home</a></li>
            <li><a href="#/library" class="nav-btn" data-route="/library"><span class="material-symbols-rounded">library_music</span> Library</a></li>
            <li><a href="#/playlists" class="nav-btn" data-route="/playlists"><span class="material-symbols-rounded">queue_music</span> Playlists</a></li>
            <li><a href="#/radio" class="nav-btn" data-route="/radio"><span class="material-symbols-rounded">radio</span> Radio</a></li>
            <li class="spacer"></li>
            <li><a href="#/settings" class="nav-btn" data-route="/settings"><span class="material-symbols-rounded">settings</span> Settings</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
        <!-- SPA Pages will be injected here -->
        <div class="page-loader">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- Right Panel (Lyrics / Queue) -->
    <aside id="right-panel" class="right-panel hidden">
        <div class="panel-header">
            <h3 id="panel-title">Paroles</h3>
            <button id="close-panel" class="icon-btn"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div id="panel-content" class="panel-content">
            <!-- Lyrics injected here -->
        </div>
    </aside>

    <!-- Bottom Player Bar -->
    <footer class="player-bar">
        <!-- Current Track Info -->
        <div class="now-playing">
            <img id="player-cover" src="/assets/default-cover.png" alt="Cover" class="cover-art">
            <div class="track-details">
                <span id="player-title" class="title">Aucun titre en lecture</span>
                <span id="player-artist" class="artist">...</span>
            </div>
            <button id="btn-like" class="icon-btn xs-hidden"><span class="material-symbols-rounded">favorite_border</span></button>
        </div>

        <!-- Central Controls -->
        <div class="player-controls">
            <div class="control-buttons">
                <button id="btn-shuffle" class="icon-btn small"><span class="material-symbols-rounded">shuffle</span></button>
                <button id="btn-prev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btn-play-pause" class="icon-btn play-btn"><span class="material-symbols-rounded" id="play-icon">play_arrow</span></button>
                <button id="btn-next" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
                <button id="btn-repeat" class="icon-btn small"><span class="material-symbols-rounded">repeat</span></button>
            </div>
            <div class="progress-container">
                <span id="time-current" class="time">0:00</span>
                <input type="range" id="seek-bar" class="seek-bar" value="0" min="0" max="100" step="0.1">
                <span id="time-total" class="time">0:00</span>
            </div>
        </div>

        <!-- Right Side Controls -->
        <div class="extra-controls">
            <!-- Speed Selector (Slowed/Sped) -->
            <div class="player-speed-control">
                <span class="label" id="speed-display">1.0x</span>
                <input type="range" id="rate-bar" style="width: 60px; height: 4px;" value="1.0" min="0.5" max="2.0" step="0.05">
            </div>

            <!-- Quality Selector -->
            <div class="quality-selector">
                <select id="stream-quality" class="invisible-select">
                    <option value="lossless">Lossless</option>
                    <option value="320000">320 kbps</option>
                    <option value="256000">256 kbps</option>
                    <option value="128000">128 kbps</option>
                </select>
                <span class="material-symbols-rounded">high_quality</span>
            </div>
            
            <button id="btn-lyrics" class="icon-btn" title="Paroles"><span class="material-symbols-rounded">lyrics</span></button>
            <button id="btn-queue" class="icon-btn" title="File d'attente"><span class="material-symbols-rounded">list</span></button>

            <!-- Volume Control -->
            <div class="volume-container">
                <span class="material-symbols-rounded" id="volume-icon">volume_up</span>
                <input type="range" id="volume-bar" class="volume-bar" value="100" min="0" max="100">
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <!-- Entry point -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
